version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=your_jwt_secret_key_here
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - '80:80'
    restart: unless-stopped
    depends_on:
      - backend
